name: c_schollapp
description: "Gestion des Frais Scolaires"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  path_provider: ^2.1.4
  pdf: ^3.11.2
  open_file: ^3.3.0
  file_selector: ^1.0.3
  cupertino_icons: ^1.0.8
  printing: ^5.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  image_path: "assets/icons/baba.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/baba.png
    - assets/secondaire.json
    - assets/fonts/Roboto-Regular.ttf


