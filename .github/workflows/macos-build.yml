name: Flutter macOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Rename app
        run: |
          mv build/macos/Build/Products/Release/Runner.app \
             build/macos/Build/Products/Release/C-MAPENDO.app

      - name: Zip app
        run: |
          cd build/macos/Build/Products/Release
          zip -r C-MAPENDO-macOS.zip C-MAPENDO.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: C-MAPENDO-macOS
          path: build/macos/Build/Products/Release/C-MAPENDO-macOS.zip
