name: Flutter macOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'
          channel: stable

      - name: Verify Flutter
        run: flutter doctor -v

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Clean project
        run: flutter clean

      - name: Build macOS
        run: flutter build macos --release

      - name: Check build output
        run: ls build/macos/Build/Products/Release

      - name: Rename app
        run: |
          if [ -d "build/macos/Build/Products/Release/Runner.app" ]; then
            mv build/macos/Build/Products/Release/Runner.app \
               build/macos/Build/Products/Release/C-MAPENDO.app
          else
            echo "❌ Runner.app not found"
            exit 1
          fi

      - name: Zip app
        run: |
          cd build/macos/Build/Products/Release
          zip -r C-MAPENDO-macOS.zip C-MAPENDO.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: C-MAPENDO-macOS
          path: build/macos/Build/Products/Release/C-MAPENDO-macOS.zip
