name: Windows Build

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile teacher.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: dist/
