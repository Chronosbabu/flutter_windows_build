name: Build Flutter Desktop (Windows + macOS)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'   # ou la version que tu veux
          channel: 'stable'

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Rename executable (optional)
        shell: powershell
        run: |
          if (Test-Path "build\windows\x64\runner\Release\flutter_windows.dll") {
            Rename-Item "build\windows\x64\runner\Release\your_app_name.exe" "C-TCC_MAPENDO.exe" -ErrorAction SilentlyContinue
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: C-TCC_MAPENDO-Windows
          path: build/windows/x64/runner/Release/

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Upload macOS artifact (the .app bundle)
        uses: actions/upload-artifact@v4
        with:
          name: C-TCC_MAPENDO-macOS
          path: build/macos/Build/Products/Release/C-TCC_MAPENDO.app

