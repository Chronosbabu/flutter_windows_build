name: Flutter Windows Build + Setup

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      # 🔥 IMPORTANT : bon nom de fichier
      - name: Rename exe
        shell: powershell
        run: |
          Rename-Item `
            "build\windows\x64\runner\Release\runner.exe" `
            "build\windows\x64\runner\Release\C-MAPENDO.exe"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Copy icon
        shell: powershell
        run: Copy-Item "assets\icons\babu.ico" "babu.ico"

      - name: Compile installer
        shell: powershell
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & "$iscc" "installer.iss"

      # 🔥 upload correct
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: C-MAPENDO-Setup
          path: C-MAPENDO.exe
